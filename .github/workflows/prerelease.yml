name: Pre-release
on:
  release:
    types: [prereleased]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - run: uv python install
      - run: uv build
      - run: uv publish --publish-url https://test.pypi.org/legacy/
